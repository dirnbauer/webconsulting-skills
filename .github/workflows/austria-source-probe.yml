name: Temporary Austrian source probe

on:
  push:
    branches:
      - tmp/austria-register-source-probe-20260710
    paths:
      - 'tools/austria_source_probe.py'
      - '.github/workflows/austria-source-probe.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tools/austria_source_probe.py'
      - '.github/workflows/austria-source-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install requests beautifulsoup4 lxml
      - run: python tools/austria_source_probe.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: austria-source-probe
          path: probe-out/**
          if-no-files-found: warn
          retention-days: 2
