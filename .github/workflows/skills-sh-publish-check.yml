name: skills.sh Publish Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "README.md"
      - "AGENTS.md"
      - ".sync-config.json"
  workflow_dispatch:
    inputs:
      skill_name:
        description: "Optional: skill directory name to validate (e.g. typo3-workspaces)"
        required: false
        default: ""

jobs:
  publish-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill structure
        shell: bash
        run: |
          set -euo pipefail
          SKILL_NAME="${{ github.event.inputs.skill_name }}"

          if [ -n "$SKILL_NAME" ]; then
            if [ ! -f "skills/$SKILL_NAME/SKILL.md" ]; then
              echo "ERROR: skills/$SKILL_NAME/SKILL.md not found"
              exit 1
            fi
            echo "Validated: skills/$SKILL_NAME/SKILL.md"
          else
            echo "No specific skill provided. Running repository-level checks."
          fi

          if [ ! -f "README.md" ]; then
            echo "ERROR: README.md missing"
            exit 1
          fi
          if [ ! -f "AGENTS.md" ]; then
            echo "ERROR: AGENTS.md missing"
            exit 1
          fi
          if [ ! -f ".sync-config.json" ]; then
            echo "ERROR: .sync-config.json missing"
            exit 1
          fi

      - name: Validate all skill frontmatter
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for f in skills/*/SKILL.md; do
            dir="$(basename "$(dirname "$f")")"
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "ERROR: $f missing YAML frontmatter"
              fail=1
              continue
            fi
            fm="$(awk '/^---$/{n++; next} n==1{print} n>=2{exit}' "$f")"
            name="$(printf '%s\n' "$fm" | sed -n 's/^name:[[:space:]]*//p' | head -1 | tr -d '"'"'"'')"
            if [ -z "$name" ]; then
              echo "ERROR: $f has no frontmatter name"
              fail=1
            elif [ "$name" != "$dir" ]; then
              echo "ERROR: $f frontmatter name '$name' != directory '$dir'"
              fail=1
            fi
            if ! printf '%s\n' "$fm" | grep -q '^description:'; then
              echo "ERROR: $f has no frontmatter description"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "All $(ls -d skills/*/ | wc -l | tr -d ' ') skills have valid frontmatter."
          exit "$fail"

      - name: Run attribution guardrails
        shell: bash
        run: python3 scripts/check_attribution_guardrails.py

      - name: Publish checklist summary
        shell: bash
        run: |
          SKILL_NAME="${{ github.event.inputs.skill_name }}"
          {
            echo "## GitHub -> skills.sh Publish Checklist"
            echo ""
            echo "- Commit merged to \`main\`: ✅"
            echo "- Repository structure valid: ✅"
            echo "- Next: verify skill visibility on skills.sh (search repo + skill name)."
            if [ -n "$SKILL_NAME" ]; then
              echo "- Checked skill: \`$SKILL_NAME\`"
            fi
            echo ""
            echo "Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
