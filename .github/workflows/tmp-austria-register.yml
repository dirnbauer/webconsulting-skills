name: Temporary Austrian register build

on:
  push:
    branches:
      - tmp/austria-register-build-20260710
    paths:
      - 'tmp/austria_register/**'
      - '.github/workflows/tmp-austria-register.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tmp/austria_register/**'
      - '.github/workflows/tmp-austria-register.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install requests beautifulsoup4 lxml pyshp
      - run: python tmp/austria_register/test_school.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmp-austria-register
          path: out/**
          if-no-files-found: warn
          retention-days: 2
