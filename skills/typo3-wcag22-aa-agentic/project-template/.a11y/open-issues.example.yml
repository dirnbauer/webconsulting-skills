schemaVersion: "1.0.0"
site:
  name: "Example TYPO3 website"
  baseUrl: "https://project.ddev.site"
  productionUrl: "https://www.example.at"
  legalProfile: "at-public-wzg"
  conformanceTarget: "WCAG 2.2 AA"
assessment:
  status: "partially_compliant" # compliant | partially_compliant | not_compliant | not_assessed
  lastTested: "YYYY-MM-DD"
  methods:
    - "Automated scan with Playwright and axe-core"
    - "TYPO3 Fluid/SCSS/JS template review"
    - "Manual WCAG 2.2 AA checkpoint review with Chrome helper"
  manualReviewSessionFiles:
    - ".a11y/manual-review/YYYY-MM-DD-homepage.json"
issueDefaults:
  source: "manual-review"
  humanReviewRequired: true
  statementCategory: "non_conformance"
openIssues:
  - id: "A11Y-001"
    title: "Homepage hero image has misleading alternative text"
    wcag:
      id: "1.1.1"
      title: "Non-text Content"
      level: "A"
      conformanceTarget: "WCAG 2.2 AA"
    affected:
      pages:
        - "https://www.example.at/"
      selectors:
        - ".hero img"
      typo3:
        components:
          - "hero.stage"
        templates:
          - "EXT:sitepackage/Resources/Private/Partials/Hero/Stage.html"
        contentElements:
          - "CType=site_hero"
    evidence:
      actual: "alt text repeats the filename and does not describe the editorial image"
      expected: "meaningful image conveys the same purpose through alt text, or is marked decorative if it adds no information"
      notes: "Human/editor confirmation required because semantic quality of alt text cannot be fully automated."
    impact:
      severity: "serious" # critical | serious | moderate | minor
      userImpact: "Screen-reader users do not receive equivalent information."
    remediation:
      responsible: "content-editor"
      plannedFix: "Update FAL alternative text and ensure the Fluid template outputs the correct metadata."
      due: null
    statement:
      includeInAccessibilityStatement: true
      category: "non_conformance"
      publicText: "Einzelne Bilder haben noch keine ausreichenden Textalternativen."
      alternative: "Informationen können über den Seiteninhalt oder auf Anfrage bereitgestellt werden."
    status: "open" # open | in_progress | fixed | accepted_exception | not_reproducible
    created: "YYYY-MM-DD"
    updated: "YYYY-MM-DD"
exceptions:
  - id: "A11Y-EX-001"
    title: "Older archived PDFs are not fully tagged"
    wcag:
      id: "1.3.1"
      title: "Info and Relationships"
      level: "A"
    affected:
      contentType: "PDF archive before 2024"
      pages:
        - "https://www.example.at/downloads/"
    reasonCategory: "disproportionate_burden" # non_conformance | disproportionate_burden | outside_scope | third_party_content | archived_content
    justificationInternal: "Large historical archive. Current documents are converted first."
    publicText: "Ältere PDF-Dokumente sind teilweise nicht vollständig barrierefrei aufbereitet."
    accessibleAlternative: "Eine barrierefreie HTML-Zusammenfassung oder Auskunft wird auf Anfrage bereitgestellt."
    reviewDate: "YYYY-MM-DD"
